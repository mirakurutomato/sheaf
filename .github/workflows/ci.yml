name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast:
    name: ruff + pytest (no latex)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (dev extras only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests (LaTeX gates skipped)
        run: pytest -m "not latex"

  latex:
    name: pytest LaTeX gate (pdflatex + lualatex)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install TeX Live (pdflatex + lualatex + tikz + pgfplots + patterns)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-luatex \
            texlive-fonts-recommended

      - name: Verify engines on PATH
        run: |
          pdflatex --version | head -n 1
          lualatex --version | head -n 1

      - name: Install package (dev extras only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: LaTeX compile gate (TikZ + PGFPlots × pdflatex + lualatex)
        run: pytest -m latex -v
